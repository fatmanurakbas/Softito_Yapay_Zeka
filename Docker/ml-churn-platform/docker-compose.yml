version: "3.9"

services:

  gateway:
    build:
      context: ./gateway
      dockerfile: dockerfile

    container_name: gateway-api

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

      logistic:
        condition: service_started

      random_forest:
        condition: service_started

      xgboost:
        condition: service_started

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/churndb

    restart: unless-stopped

  logistic:
    build:
      context: ./logistic_service
      dockerfile: dockerfile

    container_name: logistic-service

    expose:
      - "8000"

    restart: unless-stopped

  random_forest:
    build:
      context: ./rf_service
      dockerfile: dockerfile

    container_name: rf-service

    expose:
      - "8000"

    restart: unless-stopped

  xgboost:
    build:
      context: ./xgb_service
      dockerfile: dockerfile

    container_name: xgb-service

    expose:
      - "8000"

    restart: unless-stopped

  postgres:
    image: postgres:16-alpine

    container_name: churn-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: churndb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4

    container_name: churn-pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

    restart: unless-stopped

volumes:
  postgres_data: