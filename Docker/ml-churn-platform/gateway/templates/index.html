<!DOCTYPE html>
<html>
<head>
    <title>Churn Prediction Platform</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            margin:40px;
        }

        .container{
            width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        h1{
            text-align:center;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Customer Churn Prediction</h1>

<form id="predictionForm">

<label>Gender</label>
<select id="gender">
    <option>Male</option>
    <option>Female</option>
</select>

<label>Senior Citizen</label>
<input type="number" id="SeniorCitizen" value="0">

<label>Partner</label>
<select id="Partner">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Dependents</label>
<select id="Dependents">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Tenure</label>
<input type="number" id="tenure" value="12">

<label>Contract</label>
<select id="Contract">
    <option>Month-to-month</option>
    <option>One year</option>
    <option>Two year</option>
</select>

<label>Monthly Charges</label>
<input type="number" id="MonthlyCharges" value="80">

<label>Total Charges</label>
<input type="number" id="TotalCharges" value="960">

<button type="submit">
Predict
</button>

</form>

<div id="result"></div>

</div>

<script>

document
.getElementById("predictionForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const payload = {

        gender:
            document.getElementById("gender").value,

        SeniorCitizen:
            Number(document.getElementById("SeniorCitizen").value),

        Partner:
            document.getElementById("Partner").value,

        Dependents:
            document.getElementById("Dependents").value,

        tenure:
            Number(document.getElementById("tenure").value),

        PhoneService:"Yes",
        MultipleLines:"No",
        InternetService:"Fiber optic",
        OnlineSecurity:"No",
        OnlineBackup:"Yes",
        DeviceProtection:"No",
        TechSupport:"No",
        StreamingTV:"Yes",
        StreamingMovies:"Yes",

        Contract:
            document.getElementById("Contract").value,

        PaperlessBilling:"Yes",

        PaymentMethod:
            "Electronic check",

        MonthlyCharges:
            Number(document.getElementById("MonthlyCharges").value),

        TotalCharges:
            Number(document.getElementById("TotalCharges").value)

    };

    const response = await fetch(
        "/predict",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        }
    );

    const data = await response.json();

    document.getElementById("result").innerHTML = `
        <h3>Results</h3>

        <p>
        Logistic:
        ${data.logistic.prediction}
        (${(data.logistic.probability*100).toFixed(2)}%)
        </p>

        <p>
        Random Forest:
        ${data.random_forest.prediction}
        (${(data.random_forest.probability*100).toFixed(2)}%)
        </p>

        <p>
        XGBoost:
        ${data.xgboost.prediction}
        (${(data.xgboost.probability*100).toFixed(2)}%)
        </p>
    `;

});

</script>

</body>
</html>
